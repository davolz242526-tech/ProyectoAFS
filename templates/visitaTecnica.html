<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Visitas técnicas</title>

    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
    <link rel="stylesheet" th:href="@{/estilos/visitaTec.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid px-0">
        <div class="row g-0">


            <aside class="col-12 col-md-3 col-lg-2">
                <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
            </aside>


            <main class="col-12 col-md-9 col-lg-10 content">

                <div class="px-3 px-md-4 py-3">


                    <div class="toolbar-visitas">

                        <!-- IZQUIERDA: TÍTULO -->
                        <div class="toolbar-left">
                            <h2>Visitas técnicas</h2>
                        </div>

                        <!-- CENTRO: BUSCADOR -->
                        <div class="toolbar-center">

                            <label class="search-bar">

                                <i class="fa-solid fa-magnifying-glass"></i>

                                <input type="text" placeholder="ID o nombre de usuario">

                            </label>

                        </div>
                        <!-- DERECHA: BOTONES -->
                        <div class="toolbar-right">

                            <button class="btn-nueva" data-bs-toggle="modal" data-bs-target="#modalNuevaVisita">
                                <i class="fa-solid fa-plus"></i>
                                Nueva visita
                            </button>
                            <button class="btn-historial" onclick="cargarHistorial()">
                                <i class="fa-solid fa-clock-rotate-left"></i>
                                Historial
                            </button>

                        </div>

                    </div>


                    <div class="visitas-wrapper">


                        <div id="searchResults" class="search-results hidden"></div>



                        <!-- PENDIENTES -->
                        <div class="seccion-visitas pendientes">

                            <div class="titulo-seccion">
                                <i class="fa-solid fa-clock"></i>
                                <h4>Solicitudes pendientes</h4>
                            </div>

                            <div class="row g-3" id="visitasPendientes"></div>

                        </div>

                        <!-- PROGRAMADAS -->
                        <div class="seccion-visitas programadas">

                            <div class="titulo-seccion">
                                <i class="fa-solid fa-calendar-check"></i>
                                <h4>Visitas programadas</h4>
                            </div>

                            <div class="row g-3" id="visitasProgramadas"></div>

                        </div>

                    </div>







                    <div class="container mt-4 historial-container">

                        <h4 class="historial-title">
                            <i class="fa-solid fa-table"></i>
                            Historial de Visitas
                        </h4>

                        <div class="table-responsive historial-box">

                            <table class="historial-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Usuario</th>
                                        <th>Teléfono</th>
                                        <th>Especialista</th>
                                        <th>Fecha Programada</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>

                                <tbody id="tablaHistorial">
                                    <!-- dinámico -->
                                </tbody>

                            </table>

                        </div>

                    </div>








                </div>

            </main>

        </div>
    </div>





















    <div class="modal fade" id="visitaModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Agregar Visita Técnica</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="visitaId">

                    <div class="mb-2">
                        <label>Usuario</label>
                        <input type="text" id="nombreUsuario" class="form-control" readonly>
                    </div>

                    <div class="mb-2">
                        <label>Teléfono</label>
                        <input type="text" id="telefonoUsuario" class="form-control" readonly>
                    </div>

                    <div class="mb-2">
                        <label>Fecha de visita</label>
                        <input type="date" id="fechaVisita" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>Dirección</label>
                        <input type="text" id="direccion" class="form-control" value="Av. Jaime Blanco 123">
                    </div>

                    <input type="text" id="especialista" class="form-control" placeholder="Nombre del especialista">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" onclick="guardarVisita()">Guardar</button>
                </div>

            </div>

        </div>
    </div>





    <div class="modal fade" id="modalNuevaVisita" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Nueva Visita Técnica</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="text" id="nuevoUsuario" class="form-control mb-2" placeholder="Usuario">

                <input type="text" id="nuevoTelefono" class="form-control mb-2" placeholder="Teléfono">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

                <button class="btn btn-success" onclick="crearVisita()">
                    Crear visita
                </button>
            </div>

        </div>

    </div>

</div>

    <script th:src="@{/script/visitaTec.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
