<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Reportes</title>
    
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
    <link rel="stylesheet" th:href="@{/estilos/reportes.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div th:replace="fragmentos/navAdmin :: navAdmin"></div>

    <div class="main-content p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 text-light">Centro de reportes</h1>
            <div class="text-muted">Información estratégica para cada área de la empresa</div>
        </div>

        <!-- Grid de Tarjetas -->
        <div  id="report-cards">
            <!-- Las tarjetas se generan aquí -->
        </div>

        <!-- Contenedor Dinámico -->
        <div class="card bg-dark border-0 shadow-sm">
            <div class="card-header bg-dark border-0 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-light" id="report-title">Reporte de Ventas</h5>
                <div>
                    <button class="btn btn-outline-light btn-sm me-2" onclick="exportReport('pdf')">
                        <i class="bi bi-file-earmark-pdf"></i> Exportar PDF
                    </button>
                    <button class="btn btn-outline-light btn-sm" onclick="exportReport('excel')">
                        <i class="bi bi-file-earmark-excel"></i> Excel
                    </button>
                </div>
            </div>
            <div class="card-body" id="dynamic-report-content">
                <!-- Aquí se cargará dinámicamente el contenido del reporte seleccionado -->
            </div>
        </div>
    </div>

      <script th:src="@{/script/reportes.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
</body>
</html>
