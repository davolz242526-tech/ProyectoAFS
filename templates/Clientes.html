<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
    <link rel="stylesheet" th:href="@{/estilos/clientes.css}">
</head>

<body>

<div class="container-fluid">
    <div class="row g-0">

        <!-- SIDEBAR -->
        <aside class="col-12 col-md-3 col-lg-2">
            <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
        </aside>

        <!-- CONTENIDO -->
        <main class="col-12 col-md-9 col-lg-10 content">

            <div class="px-3 px-md-4 py-3">

                <!-- SEARCH (solo Bootstrap wrapper) -->
                <div class="d-flex flex-wrap align-items-center mb-4 gap-3">

                    <div class="search-bar flex-grow-1" style="min-width: 250px;">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Buscar clientes...">
                    </div>

                </div>

                <!-- TITULO -->
                <h2 class="text-white mb-4">Clientes</h2>

                <!-- TABLA -->
                <div class="table-container table-responsive">
                    <table class="table table-dark table-borderless align-middle">

                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Nivel</th>
                                <th>Última compra</th>
                                <th>Deuda</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td><span class="avatar-sm">GS</span> Granja San Pedro</td>
                                <td><span class="badge-premium">Premium</span></td>
                                <td>2026-05-02</td>
                                <td class="text-success">S/ 0</td>
                            </tr>

                            <tr>
                                <td><span class="avatar-sm">AE</span> Avícola El Sol</td>
                                <td><span class="badge-standard">Standard</span></td>
                                <td>2026-04-30</td>
                                <td class="text-danger">S/ 1240</td>
                            </tr>

                            <tr>
                                <td><span class="avatar-sm">PA</span> Postura Andina</td>
                                <td><span class="badge-premium">Premium</span></td>
                                <td>2026-05-04</td>
                                <td class="text-success">S/ 0</td>
                            </tr>

                            <tr>
                                <td><span class="avatar-sm">DL</span> Don Lucho</td>
                                <td><span class="badge-standard">Standard</span></td>
                                <td>2026-04-25</td>
                                <td class="text-danger">S/ 320</td>
                            </tr>
                        </tbody>

                    </table>
                </div>

            </div>

        </main>

    </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
